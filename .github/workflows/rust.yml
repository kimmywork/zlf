name: Rust

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Source size
        run: python3 scripts/check-rust-size.py
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings -W clippy::too_many_lines
      - name: Test
        run: cargo test --workspace
