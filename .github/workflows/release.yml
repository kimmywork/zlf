name: Build and release zlf

on:
  schedule:
    - cron: '0 0 * * *'
  push:
    tags:
      - 'v*'

permissions:
  actions: read
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.decision.outputs.is_release }}
      should_build: ${{ steps.decision.outputs.should_build }}
    steps:
      - id: decision
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "is_release=false" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" != "schedule" ]]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          completed_runs=$(gh run list --workflow release.yml --event schedule \
            --commit "$GITHUB_SHA" --status success --limit 1 \
            --json databaseId --jq 'length')
          if [[ "$completed_runs" == "0" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi

  create-release:
    needs: prepare
    if: needs.prepare.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || {
            arguments=(--title "$TAG" --generate-notes)
            [[ "$TAG" == *-* ]] && arguments+=(--prerelease)
            gh release create "$TAG" "${arguments[@]}"
          }

  build:
    needs: [prepare, create-release]
    if: always() && needs.prepare.outputs.should_build == 'true'
    name: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: win-x64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - platform: win-arm64
            runner: windows-11-arm
            target: aarch64-pc-windows-msvc
            archive: zip
          - platform: linux-x64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - platform: apple-darwin-arm64
            runner: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          - platform: apple-darwin-x64
            runner: macos-13
            target: x86_64-apple-darwin
            archive: tar.gz
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build zlf
        run: >-
          cargo build --locked --release --package zlf-cli --bin zlf
          --target ${{ matrix.target }}
      - id: label
        name: Select build label
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "value=nightly-$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
      - id: package-unix
        if: matrix.archive == 'tar.gz'
        name: Package archive
        shell: bash
        run: |
          directory="zlf-${{ steps.label.outputs.value }}-${{ matrix.platform }}"
          archive="dist/${directory}.tar.gz"
          mkdir -p "dist/${directory}"
          cp "target/${{ matrix.target }}/release/zlf" "dist/${directory}/zlf"
          tar -C dist -czf "$archive" "$directory"
          echo "path=$archive" >> "$GITHUB_OUTPUT"
      - id: package-windows
        if: matrix.archive == 'zip'
        name: Package archive
        shell: pwsh
        run: |
          $directory = "zlf-${{ steps.label.outputs.value }}-${{ matrix.platform }}"
          $archive = "dist/$directory.zip"
          New-Item -ItemType Directory -Force -Path "dist/$directory" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/zlf.exe" "dist/$directory/zlf.exe"
          Compress-Archive -Path "dist/$directory" -DestinationPath $archive
          "path=$archive" >> $env:GITHUB_OUTPUT
      - name: Upload nightly build artifact
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v4
        with:
          name: zlf-${{ steps.label.outputs.value }}-${{ matrix.platform }}
          path: ${{ steps.package-unix.outputs.path || steps.package-windows.outputs.path }}
          if-no-files-found: error
          retention-days: 14
      - name: Upload release asset
        if: needs.prepare.outputs.is_release == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          ARCHIVE: ${{ steps.package-unix.outputs.path || steps.package-windows.outputs.path }}
        run: gh release upload "$TAG" "$ARCHIVE" --clobber
